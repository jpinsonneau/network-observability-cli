apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: netobserv-cli
  namespace: "{{NAMESPACE}}"
  labels:
    app: netobserv-cli
spec:
  selector:
    matchLabels:
      app: netobserv-cli
  template:
    metadata:
      labels:
        app: netobserv-cli
    spec:
      serviceAccountName: netobserv-cli
      hostNetwork: true
      hostPID: false
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
      - operator: Exists
      containers:
      - name: netobserv-cli
        image: "{{AGENT_IMAGE_URL}}"
        imagePullPolicy: {{PULL_POLICY}}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            add:
              - "BPF"
              - "PERFMON"
              - "NET_ADMIN"
            drop:
              - ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsUser: 0
        env:
          - name: CACHE_ACTIVE_TIMEOUT
            value: "1s"
          - name: ENABLE_PCA
            value: "true"
          - name: ENABLE_OPENSSL_TRACKING
            value: "false"
          - name: TLS_PLAINTEXT_MIN_BYTES
            value: "0"
          - name: TLS_PLAINTEXT_PREVIEW_BYTES
            value: "256"
          - name: ENABLE_GOTLS_TRACKING
            value: "false"
          - name: GOTLS_CAPTURE_READ
            value: "false"
          - name: ENABLE_KTLS_TRACKING
            value: "false"
          - name: KTLS_CGROUP_ROOT
            value: ""
          - name: METRICS_ENABLE
            value: "false"
          - name: LOG_LEVEL
            value: info
          - name: FLOW_FILTER_RULES
            value: >-
              []
          - name: TC_ATTACH_MODE
            value: "any"
          - name: EXPORT
            value: "direct-flp"
          - name: FLP_CONFIG
            value: |
              {}
        volumeMounts:
            - name: bpf-kernel-debug
              mountPath: /sys/kernel/debug
              mountPropagation: HostToContainer
      volumes:
        - name: bpf-kernel-debug
          hostPath:
            path: /sys/kernel/debug
            type: Directory
