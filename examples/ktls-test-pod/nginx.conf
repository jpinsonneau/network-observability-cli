worker_processes 1;
pid /tmp/nginx.pid;
error_log /dev/stderr info;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    sendfile on;

    client_body_temp_path /tmp/nginx/client_body;
    proxy_temp_path       /tmp/nginx/proxy;
    fastcgi_temp_path     /tmp/nginx/fastcgi;
    uwsgi_temp_path       /tmp/nginx/uwsgi;
    scgi_temp_path        /tmp/nginx/scgi;

    server {
        listen 8443 ssl;
        server_name ktls-test;

        root /var/www/html;

        ssl_certificate     /tmp/tls/cert.pem;
        ssl_certificate_key /tmp/tls/key.pem;
        # kTLS offload on Linux/RHEL requires TLS 1.2 with AEAD ciphers (e.g. AES-GCM).
        # TLS 1.3 and non-AEAD suites stay in userspace OpenSSL and won't trigger sk_msg capture.
        ssl_protocols       TLSv1.2;
        ssl_ciphers         ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_conf_command      Options KTLS;

        location /healthz {
            default_type text/plain;
            try_files /healthz =404;
        }

        location = /message {
            default_type text/plain;
            add_header X-NetObserv-Stack ktls always;
            add_header X-NetObserv-Endpoint message always;
            add_header X-Fake-Authorization "Bearer fake-ktls-demo-token" always;
            add_header X-Fake-Trace-Id ktls-resp-message always;
            add_header X-Fake-Tenant demo-ktls always;
            add_header X-Content-Type-Options nosniff always;
            add_header Cache-Control "no-store" always;
            try_files /message =404;
        }

        location = /api/items {
            default_type application/json;
            add_header X-NetObserv-Stack ktls always;
            add_header X-NetObserv-Endpoint api-items always;
            add_header X-Fake-Authorization "Bearer fake-ktls-demo-token" always;
            add_header X-Fake-Trace-Id ktls-resp-items always;
            add_header X-Fake-Tenant demo-ktls always;
            add_header Cache-Control "no-store" always;
            try_files /api/items =404;
        }

        location = /api/echo {
            default_type text/plain;
            add_header X-NetObserv-Stack ktls always;
            add_header X-NetObserv-Endpoint api-echo always;
            add_header X-Fake-Authorization "Bearer fake-ktls-demo-token" always;
            add_header X-Fake-Trace-Id ktls-resp-echo always;
            add_header X-Fake-Tenant demo-ktls always;
            add_header Cache-Control "no-store" always;
            try_files /api/echo =404;
        }

        location / {
            default_type text/plain;
            add_header X-NetObserv-Stack ktls always;
            add_header X-NetObserv-Endpoint root always;
            add_header X-Fake-Trace-Id ktls-resp-root always;
            try_files $uri /index.html;
        }
    }
}
