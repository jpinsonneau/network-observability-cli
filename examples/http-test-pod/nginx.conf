worker_processes 1;
pid /tmp/nginx.pid;
error_log /dev/stderr info;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    sendfile on;

    client_body_temp_path /tmp/nginx/client_body;
    proxy_temp_path       /tmp/nginx/proxy;
    fastcgi_temp_path     /tmp/nginx/fastcgi;
    uwsgi_temp_path       /tmp/nginx/uwsgi;
    scgi_temp_path        /tmp/nginx/scgi;

    server {
        listen 8080;
        server_name http-test;

        root /var/www/html;

        location /healthz {
            default_type text/plain;
            try_files /healthz =404;
        }

        location = /message {
            default_type text/plain;
            add_header X-NetObserv-Stack http always;
            add_header X-NetObserv-Endpoint message always;
            add_header X-Fake-Authorization "Bearer fake-http-demo-token" always;
            add_header X-Fake-Trace-Id http-resp-message always;
            add_header X-Fake-Tenant demo-http always;
            add_header Cache-Control "no-store" always;
            try_files /message =404;
        }

        location = /api/items {
            default_type application/json;
            add_header X-NetObserv-Stack http always;
            add_header X-NetObserv-Endpoint api-items always;
            add_header X-Fake-Authorization "Bearer fake-http-demo-token" always;
            add_header X-Fake-Trace-Id http-resp-items always;
            add_header Cache-Control "no-store" always;
            try_files /api/items =404;
        }

        location = /api/echo {
            default_type text/plain;
            add_header X-NetObserv-Stack http always;
            add_header X-NetObserv-Endpoint api-echo always;
            add_header X-Fake-Trace-Id http-resp-echo always;
            try_files /api/echo =404;
        }

        location / {
            default_type text/plain;
            add_header X-NetObserv-Stack http always;
            add_header X-NetObserv-Endpoint root always;
            try_files $uri /index.html;
        }
    }
}
